name: Process video

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: Video id to process
        required: true

jobs:
  ffmpeg:
    runs-on: ubuntu-latest

    concurrency:
      group: video-${{ inputs.video_id }}
      cancel-in-progress: false

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Verify backend structure (debug step)
        run: ls -R

      - name: Process renditions
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
          PROCESSING_CALLBACK_TOKEN: ${{ secrets.PROCESSING_CALLBACK_TOKEN }}
          LOCAL_STORAGE_PATH: ./storage
        run: python scripts/process_video.py --video-id "${{ inputs.video_id }}"
